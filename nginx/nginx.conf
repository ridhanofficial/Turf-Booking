# ─────────────────────────────────────────────────────────────────────────────
# Nginx — Production reverse proxy for Viswa Sports API (backend only)
# Frontend: https://viswasports.com  (separate host, not proxied here)
#
# SETUP:
#   1. Point your backend domain DNS A record → 13.60.220.125
#      Recommended:  api.viswasports.com
#      Or use IP:    ec2-13-60-220-125.eu-north-1.compute.amazonaws.com
#   2. Get SSL: docker compose ... stop nginx && certbot certonly --standalone -d api.viswasports.com
#   3. Replace YOUR_BACKEND_DOMAIN below with: api.viswasports.com (or your chosen subdomain)
# ─────────────────────────────────────────────────────────────────────────────

# Rate-limit zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=otp_limit:10m  rate=5r/m;

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_BACKEND_DOMAIN;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS — API only ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_BACKEND_DOMAIN;

    # ── SSL (filled by Certbot) ───────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_BACKEND_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_BACKEND_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Allow frontend origin for browser preflight requests
    add_header Access-Control-Allow-Origin "https://viswasports.com" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    client_max_body_size 20M;

    # ── OTP endpoints — strict rate limit ────────────────────────────────────
    location ~ ^/auth/send-otp {
        limit_req zone=otp_limit burst=3 nodelay;
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Uploaded turf images — served from Docker volume ─────────────────────
    location /uploads/ {
        alias   /usr/share/nginx/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── All API routes → FastAPI backend ─────────────────────────────────────
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
