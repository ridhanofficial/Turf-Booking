# ─────────────────────────────────────────────────────────────────────────────
# Nginx — HTTP-only config (Phase 1: before SSL cert)
# Serves the API on port 80 for initial testing.
#
# Phase 2 (with SSL): Follow DEPLOY.md → "SSL Setup" section.
# ─────────────────────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=otp_limit:10m  rate=5r/m;

server {
    listen 80;
    server_name _;   # accept all — replace with your domain once DNS is set

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    client_max_body_size 20M;

    # ── OTP endpoints — strict rate limit ────────────────────────────────────
    location ~ ^/auth/send-otp {
        limit_req zone=otp_limit burst=3 nodelay;
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Uploaded turf images — served from Docker volume ─────────────────────
    location /uploads/ {
        alias   /usr/share/nginx/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── All API routes → FastAPI backend ─────────────────────────────────────
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
