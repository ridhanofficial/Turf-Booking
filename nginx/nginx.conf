# ─────────────────────────────────────────────────────────────────────────────
# Nginx — HTTPS config for api.viswasports.com
# ─────────────────────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=otp_limit:10m  rate=5r/m;

# ── HTTP → redirect to HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    server_name api.viswasports.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.viswasports.com;

    ssl_certificate     /etc/letsencrypt/live/api.viswasports.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.viswasports.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    client_max_body_size 20M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # ── OTP endpoints — strict rate limit ────────────────────────────────────
    location ~ ^/auth/send-otp {
        limit_req zone=otp_limit burst=3 nodelay;
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Uploaded turf images ─────────────────────────────────────────────────
    location /uploads/ {
        alias   /usr/share/nginx/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── All API routes → FastAPI backend ─────────────────────────────────────
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
