# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — Viswa Sports: Full EC2 production stack
# Services: Postgres · Redis · Backend (FastAPI) · Nginx
# Frontend is deployed separately (Vercel / another host).
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# First-time:
#   1. Copy deploy/env.production.example → .env.prod  (fill all values)
#   2. docker compose -f docker-compose.prod.yml up -d
#
# Upgrade:
#   git pull
#   docker compose -f docker-compose.prod.yml build backend
#   docker compose -f docker-compose.prod.yml up -d --no-deps backend
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-viswa_sports}
      POSTGRES_USER:     ${POSTGRES_USER:-viswa_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}          # required — set in .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-viswa_user} -d ${POSTGRES_DB:-viswa_sports}"]
      interval: 10s
      timeout:  5s
      retries:  5
    # ⚠️  Port 5432 is NOT exposed publicly — internal network only

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    # ⚠️  Port 6379 is NOT exposed publicly — internal network only

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    # Override DB + Redis URLs to use internal Docker service names
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-viswa_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-viswa_sports}
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379/0
      APP_ENV:      production
    volumes:
      - uploads_data:/app/uploads
    networks:
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run migrations then start gunicorn
    command: >
      sh -c "alembic upgrade head && gunicorn -c gunicorn.conf.py app.main:app"
    healthcheck:
      test:         ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 30s
    # ⚠️  Port 8000 is NOT exposed publicly — Nginx proxies it

  # ─── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt certs (run certbot on the EC2 host first)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Certbot ACME challenge (host path)
      - /var/www/certbot:/var/www/certbot:ro
      # Serve uploaded images directly through Nginx
      - uploads_data:/usr/share/nginx/uploads:ro
    networks:
      - backend_net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:     ["CMD-SHELL", "wget -qO- http://localhost/health | grep -q ok || exit 1"]
      interval: 30s
      timeout:  5s
      retries:  3


# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:   # Persistent DB storage — survives container restarts
  redis_data:      # Persistent Redis AOF storage
  uploads_data:    # Shared between backend (write) and nginx (read)


# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  backend_net:
    driver: bridge
