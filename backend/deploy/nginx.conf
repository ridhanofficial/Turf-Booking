# Viswa Sports Backend — Nginx reverse proxy (host-level, not Docker)
# Place at: /etc/nginx/sites-available/viswa-backend
# Enable:   sudo ln -s /etc/nginx/sites-available/viswa-backend /etc/nginx/sites-enabled/
# Reload:   sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN with your actual domain. If using only IP, change
# server_name to the public IP and remove the HTTPS block.

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN ec2-13-60-220-125.eu-north-1.compute.amazonaws.com;

    # Certbot ACME challenge (used during SSL setup)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS — API reverse proxy ────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # ── SSL (populated by Certbot) ────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 20M;

    # ── API proxy → Gunicorn/Uvicorn ─────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Static: uploaded turf images ──────────────────────────────────────────
    location /uploads/ {
        alias /opt/viswa-backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
