[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# NOTE: This URL is overridden by alembic/env.py which reads
# settings.DATABASE_URL from the .env file. Do not store credentials here.
# sqlalchemy.url = postgresql+asyncpg://... (set via .env instead)
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
